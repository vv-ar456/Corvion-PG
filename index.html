<!DOCTYPE html>
<html>
<head>

<body>

<header>
<img src="logo.png" class="logo">

<img src="logo.png" class="watermark">

<div class="container">

<h2>Enter Payment Amount</h2>

<input type="number" id="amount" placeholder="Enter amount">

<p class="note">
This page will be removed in the main website. This is only for demo purpose.
</p>

<button onclick="goNext()">Proceed</button>

<script>

function goNext(){
let amt=document.getElementById("amount").value;

if(amt==""){
alert("Enter amount");
return;
}

window.location.href="pay.html?amount="+amt;
}

</script>
